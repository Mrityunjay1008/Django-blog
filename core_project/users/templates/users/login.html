{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>user_login - Modern Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static "users/login.css" %}">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Enter your credentials to access your dashboard</p>

            {% if messages %}
                <ul class="messages">
                    {% for message in messages %}
                        <li class="message-item">{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}

            <form method="POST" action="{% url 'user_login' %}">
                {% csrf_token %}
                
                <div class="form-group">
                    <input type="text" name="username" id="username" class="form-input" placeholder=" " required autocomplete="username">
                    <label for="username" class="form-label">Username</label>
                </div>

                <div class="form-group">
                    <input type="password" name="password" id="password" class="form-input" placeholder=" " required autocomplete="current-password">
                    <label for="password" class="form-label">Password</label>
                </div>

                <button type="submit" class="btn-submit">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="{% url 'user_register' %}">Create one</a>
            </div>
        </div>
    </div>

</body>
</html>
