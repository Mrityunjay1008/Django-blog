{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Modern Blog{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    {% block style %}
    <link rel="stylesheet" href="{% static 'blog/main.css' %}">
    {% endblock %}
    <link rel="stylesheet" href="{% static 'blog/main.css' %}">

</head>
<body>

    <nav class="glass navbar">
        <a href="{% url 'blog_home' %}" class="nav-brand">Modern Blog</a>
        <div class="nav-links">
            <a href="{% url 'blog_home' %}">Home</a>
            <a href="{% url 'blog_about' %}">About</a>
            <a href="{% url 'blog_profile' %}">Profile</a>
            <a href="{% url 'user_logout' %}">Logout</a>
        </div>
    </nav>

    <main class="container">
        <div class="content-grid">
            {% block content %}{% endblock %}
        </div>
    </main>
    {% comment %} <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script> {% endcomment %}
</body>
</html>
